<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PsyHub</title>
<script>
try {
  var savedSettings = JSON.parse(localStorage.getItem('psyarxiv-settings') || '{}');
  var root = document.documentElement;
  if (savedSettings.theme) root.setAttribute('data-theme', savedSettings.theme);
  if (savedSettings.fontSize) root.setAttribute('data-fontsize', savedSettings.fontSize);
  if (savedSettings.dyslexic) root.setAttribute('data-dyslexic', savedSettings.dyslexic);
  if (savedSettings.font) root.setAttribute('data-font', savedSettings.font);
} catch (error) {}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Inter:wght@400;500;600;700&family=Lexend:wght@400;500;600;700&family=Lora:wght@400;500;600;700&family=Rubik:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
</head>
<body>

<header id="site-header">
  <div class="header-inner">
    <button id="sidebar-toggle" type="button" aria-label="Filters">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="4" x2="15" y2="4"/><line x1="3" y1="9" x2="15" y2="9"/><line x1="3" y1="14" x2="15" y2="14"/></svg>
    </button>
    <div class="brand-block">
      <h1>PsyHub</h1>
      <span id="header-stats" aria-live="polite">
        <span id="stat-total"></span>/<span id="stat-shown"></span>
      </span>
    </div>
    <div class="header-right">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Search..." autocomplete="off" aria-label="Search papers">
        <button id="search-clear" type="button" aria-label="Clear search" title="Clear search">&times;</button>
      </div>
      <select id="sort-select" aria-label="Sort papers">
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
        <option value="favorites">★ Favorites</option>
        <option value="unread">Unread first</option>
        <option value="date-desc">Date ↓</option>
        <option value="date-asc">Date ↑</option>
      </select>
      <button id="category-view-toggle" type="button" aria-pressed="false">By Category</button>
      <button id="settings-toggle" type="button" aria-label="Settings" aria-expanded="false">
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
          <g fill="currentColor">
            <ellipse cx="12" cy="6" rx="3.2" ry="4.4"/>
            <ellipse cx="17.7" cy="10.2" rx="3.2" ry="4.4" transform="rotate(72 17.7 10.2)"/>
            <ellipse cx="15.5" cy="17" rx="3.2" ry="4.4" transform="rotate(144 15.5 17)"/>
            <ellipse cx="8.5" cy="17" rx="3.2" ry="4.4" transform="rotate(216 8.5 17)"/>
            <ellipse cx="6.3" cy="10.2" rx="3.2" ry="4.4" transform="rotate(288 6.3 10.2)"/>
            <circle cx="12" cy="12" r="3.2" fill="#fef3c7"/>
          </g>
        </svg>
      </button>
    </div>
  </div>
</header>

<div class="main-layout">
  <aside id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-header">
        <span>Categories</span>
        <div class="sidebar-actions">
          <button id="btn-select-all" type="button">All</button>
          <button id="btn-clear-all" type="button">None</button>
        </div>
      </div>
      <div id="category-filters"></div>
    </div>

  </aside>

  <main id="papers-container">
    <div id="stats-bar" aria-live="polite" style="display:none;"></div>
    <div id="quick-nav"></div>
    <div id="papers-list"></div>
    <button id="load-more" type="button" style="display:none;">Load more papers</button>
    <p id="no-results" style="display:none;">No papers match your search or filters.</p>
  </main>
</div>

<div id="sidebar-overlay"></div>
<div id="settings-overlay"></div>

<aside id="settings-drawer">
  <div class="drawer-header">
    <span>Settings</span>
    <button id="settings-close" type="button" aria-label="Close settings">&times;</button>
  </div>
  <div class="drawer-body">
    <div class="setting-group">
      <label class="setting-label">Theme</label>
      <div class="setting-options" data-setting="theme">
        <button class="opt-btn active" data-value="light">Light</button>
        <button class="opt-btn" data-value="dark">Dark</button>
        <button class="opt-btn" data-value="purple">Purple</button>
      </div>
    </div>
    <div class="setting-group">
      <label class="setting-label">Font</label>
      <div class="setting-options" data-setting="font">
        <button class="opt-btn active" data-value="rubik">Rubik</button>
        <button class="opt-btn" data-value="inter">Inter</button>
        <button class="opt-btn" data-value="source-serif">Source Serif</button>
        <button class="opt-btn" data-value="lexend">Lexend</button>
        <button class="opt-btn" data-value="lora">Lora</button>
        <button class="opt-btn" data-value="atkinson">Atkinson</button>
      </div>
    </div>
    <div class="setting-group">
      <label class="setting-label">Font Size</label>
      <div class="setting-options" data-setting="fontSize">
        <button class="opt-btn" data-value="small">S</button>
        <button class="opt-btn active" data-value="medium">M</button>
        <button class="opt-btn" data-value="large">L</button>
        <button class="opt-btn" data-value="xlarge">XL</button>
      </div>
    </div>
    <div class="setting-group">
      <label class="setting-label">Dyslexic Font</label>
      <div class="setting-options" data-setting="dyslexic">
        <button class="opt-btn active" data-value="off">Off</button>
        <button class="opt-btn" data-value="on">On</button>
      </div>
    </div>
    <div class="setting-group">
      <label class="setting-label">Cards per page</label>
      <div class="setting-options" data-setting="pageSize">
        <button class="opt-btn" data-value="10">10</button>
        <button class="opt-btn active" data-value="25">25</button>
        <button class="opt-btn" data-value="50">50</button>
        <button class="opt-btn" data-value="100">100</button>
      </div>
    </div>
  </div>
</aside>

<footer id="site-footer">
  <p>Papers from <a href="https://osf.io/preprints/psyarxiv/" target="_blank" rel="noopener">PsyArXiv</a>. Curated for clinical relevance. Not peer-reviewed unless noted.</p>
</footer>

<div id="paper-modal" class="modal-overlay" style="display:none;">
  <div class="modal-content">
    <button id="modal-close" type="button" aria-label="Close">&times;</button>
    <div id="modal-body"></div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
