<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PsyArXiv Therapist Hub</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header id="site-header">
  <div class="header-inner">
    <div class="header-left">
      <h1>PsyArXiv Therapist Hub</h1>
      <span class="header-tagline">Curated preprints for clinical practice</span>
    </div>
    <div class="header-search">
      <input type="text" id="search-input" placeholder="Search titles, authors, topics..." autocomplete="off" aria-label="Search papers">
    </div>
  </div>
</header>

<div id="stats-bar">
  <div class="stats-inner">
    <span id="stat-total"></span>
    <span class="stat-sep">|</span>
    <span id="stat-shown"></span>
  </div>
</div>

<div class="main-layout">
  <aside id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-header">
        <span>Categories</span>
        <div class="sidebar-actions">
          <button id="btn-select-all" type="button">All</button>
          <button id="btn-clear-all" type="button">None</button>
        </div>
      </div>
      <div id="category-filters"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-header"><span>Sort</span></div>
      <select id="sort-select" aria-label="Sort papers">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
        <option value="date-desc">Source date (newest)</option>
        <option value="date-asc">Source date (oldest)</option>
        <option value="category">By category</option>
      </select>
    </div>
  </aside>

  <main id="papers-container">
    <div id="papers-list"></div>
    <button id="load-more" type="button" style="display:none;">Load more papers</button>
    <p id="no-results" style="display:none;">No papers match your search or filters.</p>
  </main>
</div>

<footer id="site-footer">
  <p>Papers sourced from <a href="https://osf.io/preprints/psyarxiv/" target="_blank" rel="noopener">PsyArXiv</a> (OSF). Curated for clinical relevance. Not peer-reviewed unless noted.</p>
</footer>

<div id="paper-modal" class="modal-overlay" style="display:none;">
  <div class="modal-content">
    <button id="modal-close" type="button" aria-label="Close">&times;</button>
    <div id="modal-body"></div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
