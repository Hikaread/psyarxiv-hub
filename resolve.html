<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resolving Paper Link</title>
<script>
try {
  var savedSettings = JSON.parse(localStorage.getItem('psyarxiv-settings') || '{}');
  var root = document.documentElement;
  if (savedSettings.theme) root.setAttribute('data-theme', savedSettings.theme);
  if (savedSettings.fontSize) root.setAttribute('data-fontsize', savedSettings.fontSize);
  if (savedSettings.dyslexic) root.setAttribute('data-dyslexic', savedSettings.dyslexic);
  if (savedSettings.font) root.setAttribute('data-font', savedSettings.font);
} catch (error) {}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Inter:wght@400;500;600;700&family=Lexend:wght@400;500;600;700&family=Lora:wght@400;500;600;700&family=Saffran:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="resolver-shell">
    <div class="resolver-card">
      <p class="resolver-kicker">PsyHub</p>
      <h1>Resolving direct paper link</h1>
      <p id="resolver-status">Looking for the paper page on PsyArXiv...</p>
      <div id="resolver-paper" class="resolver-paper"></div>
      <div id="resolver-actions" class="resolver-actions"></div>
    </div>
  </main>
  <script src="js/resolve.js"></script>
</body>
</html>
